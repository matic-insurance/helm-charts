{{- if .Values.global.mesh.enabled }}
{{- range $_, $destination := .Values.destinations }}
---
apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: {{ include "application-helpers.name" $ }}-{{ $destination.component }}
  labels:
    app.kubernetes.io/part-of: {{ $.Values.global.application.product }}
    app.kubernetes.io/version: {{ (required "$.Values.global.application.version is required for applicaiton deployment" $.Values.global.application.version) | quote }}
spec:
  host: {{ include "application-mesh.service-host" (merge (dict "component" $destination.component) $) }}
  trafficPolicy:
    {{- if (dig "stickySession" "enabled" false $destination) }}
    loadBalancer:
      consistentHash:
        {{- $stickyType := dig "stickySession" "type" (dig "stickySession" "type" "sourceIp" $.Values.defaults.destination) $destination }}
        {{- if eq $stickyType "sourceIp" }}
        useSourceIp: true
        {{- else if eq $stickyType "httpCookie" }}
        httpCookie:
          name: {{ dig "stickySession" "httpCookie" "name" (dig "stickySession" "httpCookie" "name" "istio-session" $.Values.defaults.destination) $destination | quote }}
          ttl: {{ dig "stickySession" "httpCookie" "ttl" (dig "stickySession" "httpCookie" "ttl" "3600s" $.Values.defaults.destination) $destination }}
        {{- else if eq $stickyType "httpHeaderName" }}
        httpHeaderName: {{ dig "stickySession" "httpHeaderName" (dig "stickySession" "httpHeaderName" "x-session-id" $.Values.defaults.destination) $destination | quote }}
        {{- end }}
    {{- else }}
    {{- $defaultLB := dig "loadBalancer" "LEAST_REQUEST" $.Values.defaults.destination }}
    loadBalancer:
      simple: {{ dig "loadBalancer" $defaultLB $destination }}
    {{- end }}
  subsets:
    - name: all-versions # Route traffic to all pods regardless of the deployed version. Current deployment model.
      labels:
        app.kubernetes.io/instance: {{ include "application-mesh.component-fullname" (merge (dict "component" $destination.component) $) }}
    - name: current-version # Should be used for proper blue-green deployment procedures
      labels:
        app.kubernetes.io/instance: {{ include "application-mesh.component-fullname" (merge (dict "component" $destination.component) $) }}
        {{ include "application-mesh.current-version-label" $ }}
{{- end }}
{{- end }}
